name: Build Android AAB (Production)

# ─────────────────────────────────────────────────────────────────────────────
# Builds a SIGNED release AAB (Android App Bundle) for Google Play Store.
#
# PREREQUISITES — GitHub → Settings → Secrets and variables → Actions:
#   KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
#
# TRIGGER: push to main, push tag v*, or manual workflow_dispatch
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 1.0.19)'
        required: false
        default: '1.0.19'
      version_code:
        description: 'Version code (integer)'
        required: false
        default: '19'
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

defaults:
  run:
    working-directory: expo

jobs:
  build-aab:
    name: Build Signed Release AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install project dependencies
        run: bun install

      - name: Update version in app.json
        run: |
          VERSION_NAME="${{ github.event.inputs.version_name || '1.0.19' }}"
          VERSION_CODE="${{ github.event.inputs.version_code || '19' }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION_NAME="${{ github.ref_name }}"
            VERSION_NAME="${VERSION_NAME#v}"
          fi
          echo "Setting version: $VERSION_NAME ($VERSION_CODE)"
          python3 -c "
          import json
          with open('app.json', 'r') as f:
              config = json.load(f)
          config['expo']['version'] = '$VERSION_NAME'
          config['expo']['android']['versionCode'] = int('$VERSION_CODE')
          with open('app.json', 'w') as f:
              json.dump(config, f, indent=2)
          print('app.json updated')
          "

      - name: Verify app assets
        run: |
          python3 scripts/create_notification_wav.py
          ls -lh assets/images/

      - name: Run Expo Prebuild (Android)
        run: echo "y" | npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/qaraj-release.jks
          echo "Keystore decoded successfully"
          ls -lh android/app/qaraj-release.jks

      - name: Configure release signing
        run: python3 scripts/configure_release_signing.py

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-aab-${{ hashFiles('expo/**/*.gradle*', 'expo/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-aab-

      - name: Build Release AAB
        run: |
          cd android
          ./gradlew bundleRelease \
            --no-daemon \
            -x test \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Locate and rename AAB
        run: |
          AAB=$(find android/app/build/outputs/bundle -name "*.aab" | head -1)
          echo "Found AAB: $AAB"
          VERSION="${{ github.event.inputs.version_name || '1.0.19' }}"
          cp "$AAB" "Qaraj-GM-v${VERSION}-release.aab"
          ls -lh "Qaraj-GM-v${VERSION}-release.aab"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: Qaraj-GM-AAB-Release
          path: expo/Qaraj-GM-v*-release.aab
          retention-days: 90

      - name: Build complete
        run: |
          echo "AAB build successful!"
          ls -lh Qaraj-GM-v*-release.aab

name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Android SDK ───────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install Bun ───────────────────────────────────────────────────────
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── 6. Install dependencies ──────────────────────────────────────────────
      - name: Install project dependencies
        run: bun install

      # ── 7. Create required assets ────────────────────────────────────────────
      - name: Create app icon assets
        run: |
          pip install pillow --quiet
          mkdir -p assets/images assets/sounds
          python3 - << 'EOF'
          from PIL import Image, ImageDraw, ImageFont
          import struct

          def create_icon(path, size, bg=(245,197,24), text="Q"):
              img = Image.new("RGBA", (size, size), bg)
              draw = ImageDraw.Draw(img)
              m = size // 8
              draw.ellipse([m, m, size-m, size-m], fill=(30,30,30))
              fs = size // 2
              try:
                  font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", fs)
              except:
                  font = ImageFont.load_default()
              bb = draw.textbbox((0,0), text, font=font)
              x = (size - (bb[2]-bb[0])) // 2
              y = (size - (bb[3]-bb[1])) // 2 - size//16
              draw.text((x, y), text, fill=(245,197,24), font=font)
              img.save(path)
              print(f"Created {path}")

          base = "assets/images"
          create_icon(f"{base}/icon.png", 1024)
          create_icon(f"{base}/adaptive-icon.png", 1024)
          create_icon(f"{base}/notification-icon.png", 96)
          create_icon(f"{base}/splash-icon.png", 200, bg=(255,255,255))
          create_icon(f"{base}/favicon.png", 32)

          data = b'RIFF' + struct.pack('<I',36) + b'WAVE' + b'fmt ' + struct.pack('<IHHIIHH',16,1,1,44100,88200,2,16) + b'data' + struct.pack('<I',0)
          open('assets/sounds/notification.wav','wb').write(data)
          print("All assets created")
          EOF

      # ── 8. Expo Prebuild ─────────────────────────────────────────────────────
      - name: Run Expo Prebuild (Android)
        run: echo "y" | npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      # ── 9. Make gradlew executable ───────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 10. Cache Gradle ─────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 11. Build APK ────────────────────────────────────────────────────────
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            -x test \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      # ── 12. Find and rename APK ──────────────────────────────────────────────
      - name: Locate and rename APK
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "Found APK: $APK"
          cp "$APK" Qaraj-GM-debug.apk
          ls -lh Qaraj-GM-debug.apk

      # ── 13. Upload APK as artifact ───────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Qaraj-GM-APK
          path: Qaraj-GM-debug.apk
          retention-days: 30

      # ── 14. Print download instructions ──────────────────────────────────────
      - name: Build complete
        run: |
          echo "APK build successful!"
          ls -lh Qaraj-GM-debug.apk
